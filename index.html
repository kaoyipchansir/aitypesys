<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>線上中文打字練習</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>📝 智在試一試-倉頡打字系統</h1>
        <div id="user-controls" style="display: none;">
            <button id="btn-change-pwd" onclick="showChangePassword()" style="background-color: #ffc107; color: black; margin-right: 10px;">🔑 修改密碼</button>
            <button onclick="logout()" style="background-color: #dc3545;">登出系統</button>
        </div>
    </div>

    <div id="login-section" class="section">
        <h2>登入系統</h2>
        <p style="color: #666; font-size: 14px;">學生請輸入班級與學號 (如：5A01) / 管理員請輸入 admin</p>
        <div style="margin-bottom: 15px;">
            <input type="text" id="account-id" placeholder="請輸入帳號" style="width: 200px;">
            <input type="password" id="password" placeholder="密碼" style="width: 200px;">
        </div>
        <div>
            <button onclick="login()" style="margin-right: 10px;">登入</button>
            <button onclick="guestLogin()" style="background-color: #17a2b8;">👤 訪客免帳號挑戰</button>
        </div>
    </div>

    <div id="admin-section" class="section" style="display: none; border: 2px solid #dc3545;">
        <h2 style="color: #dc3545;" id="admin-panel-title">👨‍💻 管理員備課與發佈中心</h2>
        <div style="margin-bottom: 15px; background: #f8d7da; padding: 15px; border-radius: 5px;">
            <select id="admin-type" onchange="toggleAdminTools()" style="padding: 5px; font-size: 16px; margin-bottom: 10px;">
                <option value="article">📝 文章練習</option>
                <option value="root">🔠 倉頡字根練習</option>
                <option value="auxiliary">🧩 輔助字型練習</option>
            </select>
            <input type="text" id="admin-title" placeholder="請輸入測驗標題" style="width: 25%;">
            <input type="text" id="admin-classes" placeholder="指定班級 (如: 5A,5B 或 ALL)" style="width: 20%;">
            
            <select id="admin-goal-type" onchange="toggleAdminGoalUnit()" style="padding: 5px; margin-left: 5px;">
                <option value="count">🎯 指定字數</option>
                <option value="time">⏳ 計時循環</option>
            </select>
            <input type="number" id="admin-goal-value" value="50" style="width: 60px;">
            <span id="admin-goal-unit" style="font-weight: bold;">個字</span>

            <div id="admin-article-tools" style="margin-top: 10px;">
                <label style="font-weight: bold;">📥 快速匯入文章：</label>
                <input type="file" accept=".txt" onchange="handleAdminFileUpload(event)">
            </div>

            <!-- 🌟 核心修改：字根練習改為多選框 -->
            <div id="admin-root-tools" style="margin-top: 10px; display: none; background: #fff; padding: 10px; border-radius: 5px;">
                <label style="font-weight: bold; color: #007bff;">🔠 勾選類別產生字根：</label>
                <input type="number" id="admin-root-count" value="50" style="width: 60px; margin-left: 10px;" min="10"> 字
                <div style="display: flex; gap: 15px; margin-top: 5px; flex-wrap: wrap;">
                    <label><input type="checkbox" class="root-chk" value="philosophy" checked> 哲理類</label>
                    <label><input type="checkbox" class="root-chk" value="strokes" checked> 筆畫類</label>
                    <label><input type="checkbox" class="root-chk" value="body" checked> 人體類</label>
                    <label><input type="checkbox" class="root-chk" value="shape" checked> 字型類</label>
                </div>
                <button onclick="generateAdminRoots()" style="background-color: #17a2b8; margin-top: 10px;">⚡ 依勾選類別產生</button>
            </div>

            <div id="admin-aux-tools" style="margin-top: 10px; display: none; background: #fff; padding: 10px; border-radius: 5px;">
                <label style="font-weight: bold; color: #dc3545;">🧩 勾選類別產生輔助字型：</label>
                <input type="number" id="admin-aux-count" value="50" style="width: 60px; margin-left: 10px;" min="10"> 字
                <div style="display: flex; gap: 15px; margin-top: 5px; flex-wrap: wrap;">
                    <label><input type="checkbox" class="aux-chk" value="philosophy" checked> 哲理類</label>
                    <label><input type="checkbox" class="aux-chk" value="strokes" checked> 筆畫類</label>
                    <label><input type="checkbox" class="aux-chk" value="body" checked> 人體類</label>
                    <label><input type="checkbox" class="aux-chk" value="shape" checked> 字型類</label>
                </div>
                <button onclick="generateAdminAuxiliary()" style="background-color: #28a745; margin-top: 10px;">⚡ 依勾選類別產生</button>
            </div>
        </div>
        
        <!-- 🌟 核心修改：加上了 oninput 觸發即時預覽 -->
        <textarea id="admin-content" rows="4" placeholder="測驗內容會顯示在這裡..." style="width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box;" oninput="updateAdminPreview()"></textarea>
        
        <!-- 🌟 全新加入：即時視覺預覽區 -->
        <div id="admin-preview-box" style="display: none; width: 100%; padding: 10px; background: #e9ecef; border-radius: 5px; margin-top: 5px; min-height: 40px; box-sizing: border-box;"></div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="btn-publish" onclick="publishExercise()" style="background-color: #dc3545; flex-grow: 1; font-size: 18px;">🚀 發佈練習</button>
        </div>
        <hr>
        <h3>📋 已發佈的練習列表</h3>
        <!-- 🌟 列表區域 -->
        <ul id="admin-exercise-list"></ul>
    </div>

    <div id="practice-section" class="section" style="display: none;">
        <div class="tabs" style="margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px;">
            <button id="tab-assigned" class="tab-btn active" onclick="switchMainTab('assigned')">📋 挑戰任務</button>
            <button id="tab-self" class="tab-btn" onclick="switchMainTab('self')">💪 自學模式</button>
        </div>

        <div id="assigned-ui">
            <button class="mode-btn active" onclick="switchMode('article')">文章練習</button>
            <button class="mode-btn" onclick="switchMode('root')">字根練習</button>
            <button class="mode-btn" onclick="switchMode('auxiliary')">輔助字型</button>
            <select id="exercise-select" onchange="onExerciseChange()" style="float: right; padding: 5px; font-size: 16px; display: none;">
                <option value="">請先選擇左側模式...</option>
            </select>
        </div>

        <div id="self-ui" style="display: none; background: #e9ecef; padding: 15px; border-radius: 5px;">
            <div style="margin-bottom: 10px;">
                <strong>1. 選擇類型：</strong>
                <select id="self-type" onchange="toggleSelfStudyTools()" style="padding: 5px;">
                    <option value="article">📝 自訂文章 (上傳 txt)</option>
                    <option value="ai-gen">🤖 AI 智慧生成文章</option>
                    <option value="root">🔠 倉頡字根</option>
                    <option value="auxiliary">🧩 輔助字型</option>
                </select>
            </div>
            
            <div id="self-article-tools" style="margin-bottom: 10px;">
                <strong>📥 上傳本機文章：</strong>
                <input type="file" accept=".txt" onchange="handleSelfFileUpload(event)">
            </div>

            <div id="self-ai-tools" style="margin-bottom: 10px; display: none; background: #fff; padding: 12px; border-radius: 5px; border-left: 4px solid #007bff;">
                <strong>🤖 AI 智慧出題助手：</strong><br>
                <div style="margin-top: 5px; margin-bottom: 5px;">
                    <input type="text" id="ai-prompt" placeholder="例如：寫一篇關於澳門大三巴的有趣故事" style="width: 75%;">
                    <button onclick="generateAIContent()" id="btn-ai-gen" style="background-color: #007bff;">🔮 產生文章</button>
                </div>
            </div>

            <div id="self-category-tools" style="margin-bottom: 10px; display: none;">
                <strong>2. 選擇範圍：</strong>
                <label><input type="checkbox" class="self-chk" value="philosophy" checked> 哲理類</label>
                <label><input type="checkbox" class="self-chk" value="strokes" checked> 筆畫類</label>
                <label><input type="checkbox" class="self-chk" value="body" checked> 人體類</label>
                <label><input type="checkbox" class="self-chk" value="shape" checked> 字型類</label>
            </div>

            <div style="margin-bottom: 10px;" id="self-goal-tools">
                <strong>3. 挑戰目標：</strong>
                <select id="self-goal" onchange="toggleSelfGoalInput()" style="padding: 5px;">
                    <option value="count">🎯 指定字數</option>
                    <option value="time">⏳ 計時模式</option>
                </select>
                <input type="number" id="self-goal-value" value="50" style="width: 80px;" min="1">
                <span id="self-goal-unit">個字</span>
            </div>
            <button id="btn-self-start" onclick="startSelfStudy()" style="background-color: #28a745; width: 100%; font-size: 16px; display: none;">🚀 開始自學挑戰</button>
        </div>
        
        <h2 id="mode-title" style="margin-top: 20px;">請選擇練習</h2>
        <h4 id="exercise-title-display" style="color: #007bff; margin-top: -10px;"></h4>
        <h2 id="timer-display" style="color: #dc3545; display: none; text-align: center;">剩餘時間：--:--</h2>

        <div id="text-display"></div>
        <input type="text" id="typing-input" placeholder="請在此輸入上方文字..." autocomplete="off">
        <p id="status-display" class="status-msg"></p>
    </div>

    <div id="leaderboard-section" class="section" style="display: none;">
        <h2 id="leaderboard-title">🏆 打字龍虎榜</h2>
        <ol id="leaderboard-list"></ol>
    </div>
    <script src="app.js"></script>
</body>
</html>
